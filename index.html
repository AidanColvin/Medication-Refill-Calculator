<!DOCTYPE html>
<html>
  <head>

    <title>Medication Refill Calculator</title>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.js"></script>

        {
          entrypoint: "app.py",
          files: {
            "app.py": {
              // Pulls directly from your raw GitHub code
              url: "https://raw.githubusercontent.com/AidanColvin/Medication-Refill-Calculator/main/src/app.py"
            },
            "core_logic.py": {
              // Pulls directly from your raw GitHub code
              url: "https://raw.githubusercontent.com/AidanColvin/Medication-Refill-Calculator/main/src/core_logic.py"
            }
          },
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
