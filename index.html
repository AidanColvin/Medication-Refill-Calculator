<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Medication Refill Calculator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.css" />
    <style>
      body { margin: 0; padding: 0; background: #0e1117; color: white; font-family: sans-serif; }
      #loading { padding: 50px; text-align: center; font-size: 1.2rem; margin-top: 20%; }
    </style>
  </head>
  <body>
    <div id="loading">
      💊 Loading Medication Calculator... <br><br>
      <span style="font-size: 0.9rem; color: #aaa;">(Downloading the private Python engine. This takes 5-10 seconds on your first visit!)</span>
    </div>
    
    <div id="root"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.1/build/stlite.js"></script>
    <script>
      // Hide the loading text once the app starts rendering
      const observer = new MutationObserver(function() {
          document.getElementById("loading").style.display = "none";
          observer.disconnect();
      });
      observer.observe(document.getElementById("root"), { childList: true });

      // Mount the Python files
      stlite.mount(
        {
          entrypoint: "app.py",
          files: {
            "app.py": {
              url: "./src/app.py"
            },
            "core_logic.py": {
              url: "./src/core_logic.py"
            }
          },
        },
        document.getElementById("root")
      );
    </script>
  </body>
</html>
